name: Mirror cosmos → epic (standard + raw)

on:
  schedule:
    - cron: "0 6 * * *"   # run daily
  workflow_dispatch: {}

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout destination repo (Ingest)
        uses: actions/checkout@v4

      ##############################################################
      # 1. Clone upstream repo via sparse-checkout (both folders)
      ##############################################################
      - name: Clone upstream with sparse checkout
        run: |
          git clone --no-checkout https://github.com/PopHIVE/epic_preprocessing.git upstream
          cd upstream
          git sparse-checkout init --cone
          git sparse-checkout set data/cosmos/standard data/cosmos/raw
          git checkout main

      ##############################################################
      # 2. Sync STANDARD folder (full copy)
      ##############################################################
      - name: Sync data/cosmos/standard → data/epic/standard
        run: |
          rm -rf data/epic/standard
          mkdir -p data/epic
          cp -r upstream/data/cosmos/standard data/epic/standard

      ##############################################################
      # 3. Sync RAW folder (files only, no subfolders)
      ##############################################################
      - name: Sync data/cosmos/raw → data/epic/raw (files only)
        run: |
          rm -rf data/epic/raw
          mkdir -p data/epic/raw

          # Copy only files from upstream/raw, ignoring directories
          find upstream/data/cosmos/raw -maxdepth 1 -type f -exec cp {} data/epic/raw/ \;

      ##############################################################
      # 4. Commit changes if any
      ##############################################################
      - name: Commit and push changes if any
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/epic/standard data/epic/raw
          git commit -m "Mirror cosmos folders (standard + raw)" || echo "No changes"
          git push
