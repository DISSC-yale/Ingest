on:
  schedule:
    - cron: '0 14 * * 2,5'
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          fetch-depth: 0

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            gfortran \
            libcurl4-openssl-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libudunits2-dev \
            libproj-dev \
            libgdal-dev \
            libgeos-dev \
            cmake \
            libnode-dev \
            libfontconfig1-dev

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
          use-public-rspm: true # This is key for fast binaries

      - name: Restore Renv
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 2
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }} # Helps with the credential warnings

      - name: Install Custom Package
        run: Rscript -e "renv::install('dissc-yale/dcf')"

      - name: Run Build Script
        run: Rscript scripts/build.R
        env:
          DELPHI_EPIDATA_KEY: ${{ secrets.DELPHI_EPIDATA_KEY }}

      - id: diff
        run: |
          if git diff --exit-code; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - if: ${{ steps.diff.outputs.changed == 'true' }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git commit -m "scheduled data build"
          git push