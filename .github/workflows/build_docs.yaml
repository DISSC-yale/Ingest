name: Build Documentation

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight UTC
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2

      - name: Install R dependencies
        run: |
          install.packages(c("jsonlite", "vroom", "htmltools", "glue", "arrow"))
        shell: Rscript {0}

      - name: Build documentation
        run: Rscript scripts/build_docs.R

      - name: Check for changes
        id: diff
        run: |
          if git diff --exit-code docs/ resources/data_manifest.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: ${{ steps.diff.outputs.changed == 'true' }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add docs/ resources/data_manifest.json
          git commit -m "docs: rebuild documentation and data manifest"
          git push
